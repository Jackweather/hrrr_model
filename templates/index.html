<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HRRR PNG Viewer</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #08111f;
            --panel: rgba(10, 19, 35, 0.92);
            --panel-strong: rgba(6, 13, 25, 0.96);
            --text: #f3f7ff;
            --muted: #9db1cc;
            --accent: #66d9ef;
            --border: rgba(157, 177, 204, 0.22);
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(102, 217, 239, 0.12), transparent 32%),
                linear-gradient(180deg, #10213d 0%, var(--bg) 38%, #050a12 100%);
        }

        .viewer {
            display: grid;
            grid-template-rows: 1fr auto;
            min-height: 100vh;
        }

        .viewer.is-loading .controls {
            pointer-events: none;
            opacity: 0.6;
        }

        .stage {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 20px 0;
            min-height: 0;
        }

        .image-shell {
            position: relative;
            width: 100%;
            height: calc(100vh - 132px);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            background: rgba(4, 10, 20, 0.78);
            box-shadow: var(--shadow);
        }

        .loading-screen {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 32px;
            background:
                linear-gradient(180deg, rgba(6, 13, 25, 0.84), rgba(3, 8, 16, 0.94)),
                radial-gradient(circle at top, rgba(102, 217, 239, 0.18), transparent 40%);
            z-index: 5;
            transition: opacity 220ms ease, visibility 220ms ease;
        }

        .loading-screen.is-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .is-hidden {
            display: none !important;
        }

        .loading-card {
            width: min(420px, 100%);
            padding: 24px 22px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: rgba(8, 16, 30, 0.88);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        .loading-spinner {
            width: 56px;
            height: 56px;
            margin: 0 auto 18px;
            border-radius: 50%;
            border: 3px solid rgba(102, 217, 239, 0.18);
            border-top-color: var(--accent);
            animation: spin 0.9s linear infinite;
        }

        .loading-title {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .loading-copy {
            margin: 10px 0 18px;
            color: var(--muted);
            font-size: 0.96rem;
            line-height: 1.5;
        }

        .loading-progress {
            display: grid;
            gap: 10px;
        }

        .loading-bar {
            width: 100%;
            height: 10px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.07);
        }

        .loading-bar-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #4bc0d9 0%, #8ef6ff 100%);
            transition: width 160ms ease;
        }

        .loading-meta {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .image-shell img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .empty-state {
            display: grid;
            place-items: center;
            width: 100%;
            height: 100%;
            padding: 32px;
            text-align: center;
            color: var(--muted);
            font-size: 1.1rem;
        }

        .controls {
            position: sticky;
            bottom: 0;
            display: grid;
            gap: 10px;
            padding: 16px 20px 18px;
            background: var(--panel-strong);
            border-top: 1px solid var(--border);
            box-shadow: 0 -12px 30px rgba(0, 0, 0, 0.24);
        }

        .slider-row {
            display: grid;
            align-items: center;
            gap: 14px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
        }

        .footer-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 0.92rem;
            color: var(--muted);
        }

        .footer-meta strong {
            color: var(--text);
            font-weight: 600;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 720px) {
            .stage {
                padding: 12px 12px 0;
            }

            .image-shell {
                height: calc(100vh - 150px);
                border-radius: 12px;
            }

            .footer-meta,
            .slider-row {
                grid-template-columns: 1fr;
                display: grid;
            }
        }
    </style>
</head>
<body>
    <div class="viewer">
        <main class="stage">
            <section class="image-shell">
                <div id="loadingScreen" class="loading-screen" aria-live="polite">
                    <div class="loading-card">
                        <div class="loading-spinner" aria-hidden="true"></div>
                        <p id="loadingTitle" class="loading-title">Loading forecast frames</p>
                        <p id="loadingCopy" class="loading-copy">Preparing PNGs for the viewer.</p>
                        <div class="loading-progress">
                            <div class="loading-bar" aria-hidden="true">
                                <div id="loadingBarFill" class="loading-bar-fill"></div>
                            </div>
                            <div class="loading-meta">
                                <span id="loadingCount">0 / 0</span>
                                <span id="loadingPercent">0%</span>
                            </div>
                        </div>
                    </div>
                </div>
                <img id="forecastImage" src="{{ images[0].url if images else '' }}" alt="HRRR forecast image"{% if not images %} class="is-hidden"{% endif %}>
                <div id="emptyState" class="empty-state{% if images %} is-hidden{% endif %}">
                    <div>
                        <div>No PNG files found.</div>
                        <div>Expected folder: {{ png_dir }}</div>
                    </div>
                </div>
            </section>
        </main>

        <section class="controls">
            <div class="slider-row">
                <input id="frameSlider" type="range" min="0" max="{{ image_count - 1 if image_count else 0 }}" value="0" {% if not images %}disabled{% endif %}>
            </div>
            <div class="footer-meta">
                <div><strong id="positionText">{% if images %}1 / {{ image_count }}{% else %}0 / 0{% endif %}</strong></div>
                <div>Use the slider or arrow keys to change frames.</div>
            </div>
        </section>
    </div>

    <script id="imagesData" type="application/json">{{ images | tojson }}</script>
    <script>
        let images = JSON.parse(document.getElementById("imagesData").textContent);
        const slider = document.getElementById("frameSlider");
        const image = document.getElementById("forecastImage");
        const positionText = document.getElementById("positionText");
        const emptyState = document.getElementById("emptyState");
        const viewer = document.querySelector(".viewer");
        const loadingScreen = document.getElementById("loadingScreen");
        const loadingTitle = document.getElementById("loadingTitle");
        const loadingCopy = document.getElementById("loadingCopy");
        const loadingBarFill = document.getElementById("loadingBarFill");
        const loadingCount = document.getElementById("loadingCount");
        const loadingPercent = document.getElementById("loadingPercent");
        let currentIndex = 0;
        let activeLoadToken = 0;
        let hasCompletedInitialLoad = false;

        function setLoadingProgress(loadedCount, totalCount) {
            const safeTotal = Math.max(totalCount, 1);
            const percent = totalCount ? Math.round((loadedCount / safeTotal) * 100) : 0;
            loadingBarFill.style.width = `${percent}%`;
            loadingCount.textContent = `${loadedCount} / ${totalCount}`;
            loadingPercent.textContent = `${percent}%`;
        }

        function showLoading(title, copy, loadedCount = 0, totalCount = images.length) {
            viewer.classList.add("is-loading");
            loadingTitle.textContent = title;
            loadingCopy.textContent = copy;
            setLoadingProgress(loadedCount, totalCount);
            loadingScreen.classList.remove("is-hidden");
        }

        function hideLoading() {
            viewer.classList.remove("is-loading");
            loadingScreen.classList.add("is-hidden");
        }

        async function preloadImageSet(imageSet, title, copy, options = {}) {
            const { showOverlay = true } = options;
            const loadToken = ++activeLoadToken;

            if (!imageSet.length) {
                if (showOverlay) {
                    showLoading("Waiting for forecast frames", "The viewer will open automatically when PNGs are available.", 0, 0);
                }
                return [];
            }

            if (showOverlay) {
                showLoading(title, copy, 0, imageSet.length);
            }

            let loadedCount = 0;
            const results = await Promise.all(imageSet.map(item => new Promise(resolve => {
                const preloadedImage = new Image();

                function finalize() {
                    loadedCount += 1;
                    if (showOverlay && loadToken === activeLoadToken) {
                        setLoadingProgress(loadedCount, imageSet.length);
                    }
                    resolve(item);
                }

                preloadedImage.onload = finalize;
                preloadedImage.onerror = finalize;
                preloadedImage.src = item.url;
            })));

            if (loadToken !== activeLoadToken) {
                return null;
            }

            if (showOverlay) {
                hideLoading();
            }
            return results;
        }

        function renderImageState(hasImages) {
            image.classList.toggle("is-hidden", !hasImages);
            emptyState.classList.toggle("is-hidden", hasImages);
        }

        function updateFrame(index) {
            if (!images.length || !image) {
                renderImageState(false);
                return;
            }

            const item = images[index];
            renderImageState(true);
            image.src = item.url;
            image.alt = item.filename;
            positionText.textContent = `${index + 1} / ${images.length}`;
            slider.value = index;
            currentIndex = index;
        }

        function syncSlider() {
            slider.max = Math.max(images.length - 1, 0);
            slider.disabled = images.length === 0;
        }

        async function refreshImages() {
            try {
                const response = await fetch("/api/images", { cache: "no-store" });
                if (!response.ok) {
                    return;
                }

                const nextImages = await response.json();
                if (JSON.stringify(nextImages) === JSON.stringify(images)) {
                    return;
                }

                const currentFilename = images[currentIndex]?.filename;
                const preloadedImages = await preloadImageSet(
                    nextImages,
                    "Refreshing forecast frames",
                    "Loading the latest PNG set before the viewer updates.",
                    { showOverlay: !hasCompletedInitialLoad }
                );
                if (preloadedImages === null) {
                    return;
                }

                images = preloadedImages;
                syncSlider();

                if (!images.length) {
                    renderImageState(false);
                    positionText.textContent = "0 / 0";
                    return;
                }

                hasCompletedInitialLoad = true;
                const matchingIndex = images.findIndex(item => item.filename === currentFilename);
                const nextIndex = matchingIndex >= 0 ? matchingIndex : Math.min(currentIndex, images.length - 1);
                updateFrame(nextIndex);
            } catch {
                return;
            }
        }

        if (slider && images.length) {
            syncSlider();
            slider.addEventListener("input", event => {
                updateFrame(Number(event.target.value));
            });

            document.addEventListener("keydown", event => {
                if (event.key === "ArrowLeft") {
                    updateFrame(Math.max(Number(slider.value) - 1, 0));
                }
                if (event.key === "ArrowRight") {
                    updateFrame(Math.min(Number(slider.value) + 1, images.length - 1));
                }
            });

            preloadImageSet(
                images,
                "Loading forecast frames",
                "Preparing every PNG before the first frame is shown."
            ).then(preloadedImages => {
                if (!preloadedImages) {
                    return;
                }
                images = preloadedImages;
                syncSlider();
                hasCompletedInitialLoad = true;
                updateFrame(0);
            });
        } else {
            syncSlider();
            renderImageState(false);
            showLoading("Waiting for forecast frames", "The viewer will open automatically when PNGs are available.", 0, 0);
        }

        window.setInterval(refreshImages, 5000);
    </script>
</body>
</html>
